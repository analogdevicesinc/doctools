name: Git Checkout
description: A git checkout for local runners and runs

inputs:
  repository:
    description: "Repository to checkout"
    default: ${{ github.repository }}
  base-sha:
    description: "Base SHA for fetch depth"
    required: false
  head-sha:
    description: "Head SHA to checkout"
    required: false
  gh-token:
    description: "GitHub Token"
    default: ${{ github.token }}
  path:
    description: "Path to checkout"
    default: '.'
  lfs:
    description: "Enable Git LFS"
    default: 'false'


# behaviour:
# cache/ branches are created to avoid base refs from being garbage collected.
# on PRs, the github automatic merge commit is flattened, allowing to check per commit.
# if head-sha is set, uses simple fetch flow (for external repos, including
# submodules, or workflow_dispatch).

runs:
  using: composite
  steps:
    - name: Sanity check
      shell: bash
      run: |
        # Sanity check
        if [[ -z "${{ inputs.head-sha }}" ]] && [[ -n "${{ inputs.base-sha }}" ]]; then
          echo "::error ::Cannot set base-sha without specifying a head-sha."
          exit 1
        fi

    - name: Prepare git
      shell: bash
      run: |
        # Prepare git
        [[ "${{ runner.debug }}" == "1" ]] && set -x
        mkdir -p "${{ inputs.path }}" ; cd "${{ inputs.path }}"
        if command -v git-lfs >/dev/null 2>&1; then
          if [ "${{ inputs.lfs }}" = "true" ]; then
            git lfs install
          else
            git lfs install --skip-smudge
          fi
        elif [ "${{ inputs.lfs }}" = "true" ]; then
          echo "::warning ::Git LFS set to true, but git-lfs is not installed."
        fi
        # Prepare git
        if [[ "${{ inputs.repository }}" =~ ^(git@|ssh://|https://) ]]; then
          url="${{ inputs.repository }}"
          org_repository=$(echo "${{ inputs.repository }}" | sed -E 's|.*[:/]([^/]+/[^/.]+)(\.git)?$|\1|')
        else
          url="https://x-access-token:${{ inputs.gh-token }}@github.com/${{ inputs.repository }}.git"
          org_repository="${{ inputs.repository }}"
        fi

        if [[ -f .git/shallow.lock ]] || [[ -f .git/index.lock ]]; then
          rm -rf -- ..?* .[!.]* *
        fi

        if [[ ! -d .git ]]; then
          git init --initial-branch=trunk .
          git config core.pager cat
          git remote add origin "$url"
          local_ref="/mnt/git/$org_repository.git"
          if [[ -d $local_ref ]]; then
            git remote add local "file://$local_ref"
            git fetch local --depth 10
            git remote rm local
          fi
        else
          git config core.pager cat
          git remote set-url origin "$url"

          git am --abort 2>/dev/null || true
          git merge --abort 2>/dev/null || true
          git rebase --abort 2>/dev/null || true
          git revert --abort 2>/dev/null || true
          git cherry-pick --abort 2>/dev/null || true
          git bisect reset 2>/dev/null || true
          git stash clear || true

          git reset --hard --quiet
          git clean -ffdx --quiet .

          git switch -d 2>/dev/null || true
          echo "clean-up branches"
          branches=$((git branch || true) | (grep -v ^'*' | grep -v ^'\s\+cache/' | grep -v ^'\s\+mirror/' || true))
          if [[ "$branches" ]]; then
            git branch -D $branches || true
          fi
          git switch -C trunk
        fi

        if [[ -z "$(git config user.name)"  ]]; then
          git config user.name "github-actions[bot]"
        fi
        if [[ -z "$(git config user.email)"  ]]; then
          git config user.email "github-actions[bot]@users.noreply.github.com"
        fi

    - name: Get commit depth
      shell: bash
      run: |
        # Get commit depth
        [[ "${{ runner.debug }}" == "1" ]] && set -x
        cd "${{ inputs.path }}"

        if [[ -n "${{ inputs.head-sha }}" ]]; then
          head_sha="${{ inputs.head-sha }}"
          echo "head_sha=$head_sha" >> $GITHUB_ENV
          echo "fetch_depth=7" >> $GITHUB_ENV
        elif [[ "${{ inputs.repository }}" == "${{ github.repository }}" ]] && [[ "${{ github.event_name }}" == "pull_request" ]]; then
          json=$(curl -s -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ inputs.gh-token }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/compare/${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
          | jq '{behind_by, ahead_by, merge_base_sha: .merge_base_commit.sha}')
          ahead_by=$(echo $json | jq '.ahead_by')
          behind_by=$(echo $json | jq '.behind_by')
          merge_base_sha=$(echo $json | jq '.merge_base_sha')
          if [[ "$merge_base_sha" == "null" ]]; then
            echo "::warning ::GitHub API failed to determine merge base sha, will checkout merge commit."
            echo "fetch_depth=3" >> $GITHUB_ENV
            echo "checkout_fallback=true" >> $GITHUB_ENV
          else
            fetch_depth=$(( ahead_by + behind_by + 2 ))
            echo "behind_by=$behind_by" >> $GITHUB_ENV
            echo "fetch_depth=$fetch_depth" >> $GITHUB_ENV
          fi
        elif [[ "${{ inputs.repository }}" == "${{ github.repository }}" ]] && [[ "${{ github.event_name }}" == "push" ]]; then
          if [[ ! "${{ github.event.before }}" =~ "0000000000000000" ]] && [[ "${{ github.event.forced }}" == "false" ]]; then
            echo "setting fetch_depth based on github.event.before"
            commits_sha='${{ toJSON(github.event.commits.*.id) }}' ;
            fetch_depth=$(( $(jq <<<"$commits_sha" length) + 1 )) ;
            echo "fetch_depth=$fetch_depth" >> $GITHUB_ENV ;
          else
            if [[ "${{ github.event.before }}" =~ "0000000000000000" ]]; then
              echo "::notice ::New branch, will set base commit as last 5 commits."
            else
              echo "::notice ::Force pushed, will set base commit as last 5 commits."
            fi
            echo "fetch_depth=7" >> $GITHUB_ENV
            echo "checkout_fallback=true" >> $GITHUB_ENV
          fi
        else
          head_sha=$(git ls-remote origin HEAD | awk '{print $1}' | tail -1)
          echo "head_sha=$head_sha" >> $GITHUB_ENV
          echo "fetch_depth=3" >> $GITHUB_ENV
        fi

    - name: Fetch & reset
      shell: bash
      run: |
        # Fetch & reset
        [[ "${{ runner.debug }}" == "1" ]] && set -x
        cd "${{ inputs.path }}"
        _fetch_depth=$(( fetch_depth > 500 ? 500 : fetch_depth ))
        # --empty was added on git 2.26.0
        has_keep=$(git rebase -help 2>&1 | grep "\--empty" | wc -l) || true
        if [[ "$has_keep" -gt "0" ]]; then
          keep_empty="--empty=keep"
        else
          keep_empty="--keep-empty"
        fi

        if [[ -n "$head_sha" ]]; then
          git fetch origin --depth=$_fetch_depth $head_sha
          git reset --hard FETCH_HEAD
          if [[ -n "${{ inputs.base-sha }}" ]]; then
            base_sha="${{ inputs.base-sha }}"
          else
            base_sha="$head_sha~$((_fetch_depth - 2))"
          fi
        elif [[ "${{ inputs.repository }}" == "${{ github.repository }}" ]] && [[ "${{ github.event_name }}" == "pull_request" ]]; then
          if [[ "$checkout_fallback" == "true" ]]; then
            git fetch origin --depth=$_fetch_depth ${{ github.sha }}
            git reset --hard FETCH_HEAD
          elif [[ "$behind_by" -eq 0 ]]; then
            git fetch origin --depth=$_fetch_depth ${{ github.event.pull_request.head.sha }}
            git reset --hard FETCH_HEAD
          else
            echo "Fetching commits in batches of $_fetch_depth"
            while ! git merge-base ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} &>/dev/null ; do
              git fetch origin --deepen=$_fetch_depth ${{ github.sha }}
            done
            git reset --hard ${{ github.event.pull_request.base.sha }}
            git rebase --rebase-merges $keep_empty ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}
            git switch -C trunk
          fi
          head_sha=$(git rev-parse @)
          if [[ "$checkout_fallback" != "true" ]]; then
            base_sha=${{ github.event.pull_request.base.sha }}
          else
            base_sha="@~"
          fi
        elif [[ "${{ inputs.repository }}" == "${{ github.repository }}" ]] && [[ "${{ github.event_name }}" == "push" ]]; then
          git fetch origin --depth=$_fetch_depth ${{ github.sha }}
          git reset --hard FETCH_HEAD
          head_sha=$(git rev-parse @)
          if [[ "$checkout_fallback" != "true" ]]; then
            base_sha=${{ github.event.before }}
          else
            base_sha="@~$((_fetch_depth - 2))"
          fi
        fi

        while ! git rev-parse $base_sha~ ; do
          git fetch origin --deepen=$_fetch_depth $head_sha
        done
        base_sha=$(git rev-parse $base_sha)

        if git log --oneline --pretty=format:'%s' $base_sha..$head_sha | grep ^fixup! ; then
          echo "Has fixups! in range, applying"
          git rebase $keep_empty --rebase-merges --autosquash $base_sha \
            || git rebase --abort || true
        else
          echo "No fixups! in range"
        fi
        head_sha=$(git rev-parse @)

        echo "head_sha=$head_sha" >> "$GITHUB_ENV"
        echo "base_sha=$base_sha" >> "$GITHUB_ENV"

    - name: Log commit range
      shell: bash
      run: |
        # Log commit range
        [[ "${{ runner.debug }}" == "1" ]] && set -x
        cd "${{ inputs.path }}"
        git log --oneline --reverse $base_sha..$head_sha

    - name: Generate cache branches & rename
      shell: bash
      if: ${{ github.repository == inputs.repository && inputs.head-sha == '' }}
      run: |
        # Generate cache branches & rename
        [[ "${{ runner.debug }}" == "1" ]] && set -x
        cd "${{ inputs.path }}"
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          branch=${{ github.base_ref }}
          commit=${{ github.event.pull_request.base.sha }}
        else
          branch=${{ github.ref_name }}
          commit=$head_sha
        fi
        git branch cache/$branch $commit -f
        git branch -m $branch 2>/dev/null || true
        git --no-pager branch
