name: GH Collect PR Comments
description: Collect and output pull request comments

inputs:
  repository:
    description: "Repository to checkout"
    default: ${{ github.repository }}
  ref:
    description: "The branch, tag, SHA, or PR number (e.g. 123 or pull/123) to resolve"
    default: ${{ github.sha }}
  gh-token:
    description: "GitHub Token"
    default: ${{ github.token }}

outputs:
  pr:
    description: "Pull request number"
    value: ${{ steps.get_pr.outputs.pr }}
  comments_file:
    description: "File with collected PR issue comments and review comments"
    value: ${{ steps.collect.outputs.comments_file }}

runs:
  using: composite
  steps:
    - name: Use pull request context
      if: ${{ github.event_name == 'pull_request' && inputs.repository == github.repository && inputs.ref == github.sha }}
      shell: bash
      run: |
        # Use pull request context
        echo "pr=${{ github.event.pull_request.number }}" >> "$GITHUB_ENV"

    # requires pull_requests: read
    - name: Resolve ref to pr number
      id: get_pr
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.repository == github.repository }}
      shell: bash
      run: |
        # Resolve ref to pr number
        [[ "${{ runner.debug }}" == "1" ]] && set -x

        ref="${{ inputs.ref }}"
        ref="${ref//[[:space:]]/}"
        ref="${ref#\#}"
        repository="${{ inputs.repository }}"

        resp=
        pr_json=
        pr=

        if ! [[ "$ref" =~ ^([0-9]+|pull/[0-9]+)(/head)?$ ]]; then
          # branch/commit

          # try branch
          branch_="${ref#refs/heads/}"
          [[ "$branch_" == *":"* ]] || {
            owner="${repository%/*}"
            branch_="$owner:$branch_"
          }
          # some-user:my-fix
          resp=$(curl -s \
            -H "Authorization: Bearer ${{ inputs.gh-token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$repository/pulls?head=$branch_&state=open")

          status=$(echo "$resp" | jq -r '.status? // empty')
          [[ "$status" == "403" ]] && echo "::notice ::gh-collect-comments: List pull requests requires pull_requests read permission." || :
          [[ -n "$status" ]] || pr_json=$(echo "$resp" | jq '.[0] // empty')

          if [[ -z "$pr_json" ]]; then
            # try sha
            sha="$ref"
            resp=$(curl -s \
              -H "Authorization: Bearer ${{ inputs.gh-token }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$repository/commits/$sha/pulls")

            status=$(echo "$resp" | jq -r '.status? // empty')
            [[ -n "$status" ]] || pr_json=$(echo "$resp" | jq '.[0] // empty')
          fi

          pr=$(echo "$pr_json" | jq -r '.number // empty')
        else
          # pr number
          pr="${ref#pull/}"
          pr="${pr%/head}"
        fi

        echo "pr=$pr" >> "$GITHUB_OUTPUT"
        echo "pr=$pr" >> "$GITHUB_ENV"

    - name: Collect PR comments
      id: collect
      shell: bash
      run: |
        # Collect PR comments
        [[ "${{ runner.debug }}" == "1" ]] && set -x

        gh_collect_comments() {
          local github_token="$1"
          local org_repository="$2"
          local pr="$3"
          local comments_file="$4"

          local resp page count
          local issue_comments review_comments sep ic_count rc_count root_id

          [[ -n "$pr" ]] || return 0

          echo "$org_repository" "pr=$pr"

          issue_comments=$(mktemp --suffix=.json)
          review_comments=$(mktemp --suffix=.json)
          echo '[]' > "$issue_comments"
          echo '[]' > "$review_comments"

          # Collect issue comments
          page=1
          while :; do
            resp=$(curl -s \
              -H "Authorization: Bearer $github_token" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$org_repository/issues/$pr/comments?per_page=100&page=$page")

            count=$(echo "$resp" | jq 'length')
            [[ "$count" -eq 0 ]] && break

            jq -s '.[0] + .[1]' "$issue_comments" <(echo "$resp") > "${issue_comments}.tmp"
            mv "${issue_comments}.tmp" "$issue_comments"
            page=$((page + 1))
          done

          # Collect review comments
          page=1
          while :; do
            resp=$(curl -s \
              -H "Authorization: Bearer $github_token" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$org_repository/pulls/$pr/comments?per_page=100&page=$page")

            count=$(echo "$resp" | jq 'length')
            [[ "$count" -eq 0 ]] && break

            jq -s '.[0] + .[1]' "$review_comments" <(echo "$resp") > "${review_comments}.tmp"
            mv "${review_comments}.tmp" "$review_comments"
            page=$((page + 1))
          done

          sep='------------------------------------------------------------'

          # Format issue comments (plain, no threading)
          ic_count=$(jq 'length' "$issue_comments")
          if [[ "$ic_count" -gt 0 ]]; then
            echo "PR #$pr — Conversation comments" >> "$comments_file"
            echo "$sep" >> "$comments_file"
            jq -r '.[] | "\(.created_at): @\(.user.login)\n\n\(.body)\n"' \
              "$issue_comments" >> "$comments_file"
          fi

          # Format review comments: group roots by path:line, nest replies with >
          rc_count=$(jq 'length' "$review_comments")
          if [[ "$rc_count" -gt 0 ]]; then
            [[ "$ic_count" -gt 0 ]] && echo >> "$comments_file"
            echo "PR #$pr — Code review comments" >> "$comments_file"
            echo "$sep" >> "$comments_file"

            mapfile -t root_ids < <(jq -r '.[] | select(.in_reply_to_id == null) | .id' "$review_comments")

            for root_id in "${root_ids[@]}"; do
              jq -r --argjson id "$root_id" '
                .[] | select(.id == $id)
                | (.line // .original_line) as $line
                | "\(.created_at): @\(.user.login) \(.path)" + (if $line != null then ":\($line)" else "" end)
                  + "\n\n\(.body)\n"
              ' "$review_comments" >> "$comments_file"

              jq -r --argjson id "$root_id" '
                .[] | select(.in_reply_to_id == $id)
                | "  > \(.created_at): @\(.user.login)\n"
                  + ("\(.body)" | split("\n") | map("  > " + .) | join("\n"))
                  + "\n"
              ' "$review_comments" >> "$comments_file"

              echo "$sep" >> "$comments_file"
            done
          fi

          rm -f "$issue_comments" "$review_comments"

          return 0
        }

        comments_file=$(mktemp --suffix=.txt)
        gh_collect_comments "${{ inputs.gh-token }}" \
                            "${{ inputs.repository }}" \
                            "${{ env.pr }}" \
                            "$comments_file"

        echo "Got $(wc -l < "$comments_file") comment lines"

        echo "comments_file=$comments_file" >> "$GITHUB_OUTPUT"
        echo "comments_file=$comments_file" >> "$GITHUB_ENV"
