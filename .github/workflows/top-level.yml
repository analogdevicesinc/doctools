on:
  push:
    branches:
      - main
      - dev/*
  pull_request:

jobs:
  state:
    runs-on: [self-hosted, repo-only]
    outputs:
      changed: ${{ steps.state.outputs.changed_keys }}
    steps:
    - uses: analogdevicesinc/doctools/changed-files@action-debug
      id: state
      with:
        rules: |
          package:^adi_doctools/
          doc:^doc/
          ci:^.github/\|^ci/

  build-package:
    needs: [state]
    if: contains(needs.state.outputs.changed, 'package')
    uses: ./.github/workflows/build-package.yml
    secrets: inherit
  build-doc:
    uses: ./.github/workflows/build-doc.yml
    needs: [build-package]
    secrets: inherit
    with:
      tag: ${{ needs.build-package.outputs.tag }}
  tests:
    uses: ./.github/workflows/tests.yml
    needs: [build-package]
    secrets: inherit
  custom-doc:
    uses: ./.github/workflows/custom-doc.yml
    needs: [build-package]
    secrets: inherit
  deploy:
    uses: ./.github/workflows/deploy.yml
    needs: [build-package, build-doc, tests, custom-doc]
    secrets: inherit
    permissions:
      contents: write
      id-token: write
    with:
      asset_alias_name: ${{ needs.build-package.outputs.asset_alias_name }}
      asset_path: ${{ needs.build-package.outputs.asset_path }}
      new_tag: ${{ needs.build-package.outputs.new_tag }}
      tag: ${{ needs.build-package.outputs.tag }}
