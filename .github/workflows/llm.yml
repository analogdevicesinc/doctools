name: LLM Agent
run-name: LLM run ${{ inputs.ref }}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "The branch, tag, PR number, or SHA to checkout"
        required: false
        type: string
      prompt:
        description: "Prompt to use, overwrites the default"
        required: false
        type: string
        default: ""
      prompt-extra:
        description: "Extra prompt to concatenate"
        required: false
        type: string
        default: ""
      model:
        description: "Model size"
        type: choice
        options:
        - small
        - medium
        - large

jobs:
  llm:
    runs-on: [self-hosted, repo-only, v2]
    permissions:
      contents: read
      checks: read
      pull-requests: read

    outputs:
      pr: ${{ steps.llm.outputs.pr }}
      comment: ${{ steps.llm.outputs.comment }}

    steps:
      - name: Prepare prompt
        run: |
          prompt_file=$(mktemp --suffix=.md)
          echo "prompt_file=$prompt_file" >> "$GITHUB_ENV"

          cat <<'EOF' > "$prompt_file"
          ${{ inputs.prompt }}
          EOF

          grep -q '[^[:space:]]' "$prompt_file" || \
          cat <<'EOF' > "$prompt_file"
          You are an Python and JavaScript expert and will review my code.
          EOF
          cat <<'EOF' >> "$prompt_file"
          ${{ inputs.prompt-extra }}
          EOF

      - name: Prepare tools
        shell: bash
        run: |
          py_venv="$(mktemp -d)"
          echo "py_venv=$py_venv" >> "$GITHUB_ENV"

          python3 -m venv $py_venv
          source $py_venv/bin/activate
          python3 -m ensurepip --upgrade
          pip install adi-doctools camelot-py

      - uses: analogdevicesinc/doctools/llm@action
        id: llm
        with:
          ref: ${{ inputs.ref }}
          model: ${{ inputs.model }}
          prompt-file: ${{ env.prompt_file }}
          api-key: ${{ secrets.PORTKEY_API_KEY }}
          py-venv: ${{ env.py_venv }}

      - name: Clean-up
        if: always()
        run: |
          rm -f "$prompt_file"
          rm -rf "$py_venv"

  pr-comment:
    runs-on: [self-hosted, repo-only]
    needs: llm
    permissions:
      pull-requests: write

    steps:
      - uses: analogdevicesinc/doctools/gh-pr-comment@action
        with:
          pr: ${{ needs.llm.outputs.pr }}
          body: ${{ needs.llm.outputs.comment }}
