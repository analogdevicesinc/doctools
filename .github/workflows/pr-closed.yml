on:
  pull_request:
    types: [closed]

jobs:
  clean-gh-pages:
    runs-on: ${{ vars.RUNNER != '' && fromJSON(vars.RUNNER) || 'ubuntu-slim' }}
    permissions:
      contents: write

    steps:
    - uses: analogdevicesinc/doctools/gh-pages-rm-path@action
      with:
        path: pull/${{ github.event.number }}
