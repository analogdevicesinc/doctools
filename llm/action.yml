name: LLM Agent

inputs:
  ref:
    description: "The branch, tag, PR number, or SHA to checkout"
    required: true
  run-id:
    description: "Explicit workflow run to analyse"
    required: false
  prompt-file:
    description: "File with the prompt to use"
    required: true
    default: ""
  model:
    description: "Model size"
    required: false
    default: "medium"
  py-venv:
    description: "Python virtual enviroment"
    required: false
    default: ""
  sh-source:
    description: "Bash script to source"
    required: false
  gh-token:
    description: "GitHub Token"
    default: ${{ github.token }}
  api-key:
    description: 'LLM API Key'
    required: false

runs:
  using: composite
  steps:
    - name: Check if should run
      shell: bash
      if: ${{ inputs.api-key != '' && inputs.api-key != ' ' }}
      run: |
        # Check if should run
        echo "LLM_AGENT_RUN=true" >> "$GITHUB_ENV"

    - name: Warn on won't run
      shell: bash
      if: ${{ inputs.api-key == '' || inputs.api-key == ' ' }}
      run: |
        # Warn on won't run
        echo "::warning ::llm: Input 'api-key' empty, won't run"

    - uses: analogdevicesinc/doctools/checkout@action
      if: ${{ env.LLM_AGENT_RUN == 'true' }}
      with:
        ref: ${{ inputs.ref }}

    - uses: analogdevicesinc/doctools/gh-collect-annotations@action
      if: ${{ env.LLM_AGENT_RUN == 'true' }}
      with:
        head-sha: ${{ env.head_sha }}
        run-id: ${{ inputs.run-id }}

    - name: Prepare files
      shell: bash
      if: ${{ env.LLM_AGENT_RUN == 'true' }}
      run: |
        # Prepare files
        echo "session_file=$(mktemp --suffix=.jsonl)" >> "$GITHUB_ENV"
        echo "summary_file=$(mktemp --suffix=.md)" >> "$GITHUB_ENV"
        echo "patches_path=$(mktemp -d)" >> "$GITHUB_ENV"

    - name: Ensure node
      shell: bash
      if: ${{ env.LLM_AGENT_RUN == 'true' }}
      run: |
        # Ensure node
        if ! which node ; then
          if [[ -d "/home/runner/externals/node24/bin" ]]; then
            echo "/home/runner/externals/node24/bin" >> "$GITHUB_PATH"
          elif [[ -d "/home/runner/externals/node20/bin" ]]; then
            echo "/home/runner/externals/node20/bin" >> "$GITHUB_PATH"
          fi
        fi

    - name: Setup pi
      shell: bash
      if: ${{ env.LLM_AGENT_RUN == 'true' }}
      run: |
        # Setup pi
        npm install @mariozechner/pi-coding-agent@0.66.1

        curl -sL -H "Authorization: Bearer ${{ inputs.gh-token }}" -o "/tmp/fmt_args.py" \
          https://raw.githubusercontent.com/analogdevicesinc/doctools/action/llm/fmt_args.py
        curl -sL -H "Authorization: Bearer ${{ inputs.gh-token }}" -o "/tmp/observer.py" \
          https://raw.githubusercontent.com/analogdevicesinc/doctools/action/llm/observer.py

        mkdir -p ~/.pi/agent
        cat <<'EOF' > ~/.pi/agent/models.json
        {
            "providers": {
                "portkey": {
                    "baseUrl": "https://api.portkey.ai",
                    "api": "anthropic-messages",
                    "apiKey": "PORTKEY_API_KEY",
                    "headers": {
                        "x-portkey-api-key": "PORTKEY_API_KEY",
                        "x-portkey-virtual-key": "vertexai-global"
                    },
                    "models": [
                        {"name": "small", "id": "anthropic.claude-haiku-4-6"},
                        {"name": "medium", "id": "anthropic.claude-sonnet-4-6"},
                        {"name": "large", "id": "anthropic.claude-opus-4-6"}
                    ]
                }
            }
        }
        EOF

    - name: Run pi
      shell: bash
      if: ${{ env.LLM_AGENT_RUN == 'true' }}
      env:
        PORTKEY_API_KEY: ${{ inputs.api-key }}
      run: |
        # Run pi
        [[ -f "${{ inputs.py-venv }}/bin/activate" ]] && \
          source "${{ inputs.py-venv }}/bin/activate"
        [[ -f "${{ inputs.sh-source }}" ]] && \
          source "${{ inputs.sh-source}}"

        python3 /tmp/observer.py "$session_file" &
        observer_pid=$!

        python3 /tmp/fmt_args.py "${{ inputs.prompt-file }}" | \
          ./node_modules/.bin/pi -p \
            --provider "portkey" --model "${{ inputs.model }}" \
            --session "$session_file" || true

        kill $observer_pid

    - name: Collect results
      shell: bash
      if: ${{ env.LLM_AGENT_RUN == 'true' }}
      run: |
        # Collect results
        [[ -s "$summary_file" ]] && cat "$summary_file" >> $GITHUB_STEP_SUMMARY || true

    - name: Store suggested patches
      if: ${{ env.LLM_AGENT_RUN == 'true' }}
      id: upload_patches
      uses: actions/upload-artifact@v6
      with:
        name: llm-patches
        path: ${{ env.patches_path }}
        if-no-files-found: ignore

    - name: Store session log
      if: ${{ env.LLM_AGENT_RUN == 'true' }}
      id: upload_session
      uses: actions/upload-artifact@v6
      with:
        name: llm-session
        path: ${{ env.session_file }}
        if-no-files-found: ignore

    - name: Add patches to summary
      shell: bash
      if: ${{ env.LLM_AGENT_RUN == 'true' }}
      run: |
        # Add patches to summary
        [[ -z "$(ls -A "$patches_path")" ]] && exit 0

        # Requires upload-artifact@v6
        url="${{ steps.upload_patches.outputs.artifact-url }}"
        echo "## Suggested patches" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Suggested patches are provided at the [llm-patches]($url) artifact." >> $GITHUB_STEP_SUMMARY

    - name: Add session to summary
      shell: bash
      if: ${{ env.LLM_AGENT_RUN == 'true' }}
      run: |
        # Add session to summary
        [[ -s "$session_file" ]] || exit 0

        url="${{ steps.upload_session.outputs.artifact-url }}"
        echo "## Session" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "The session is provided at the [llm-session]($url) artifact." >> $GITHUB_STEP_SUMMARY

    - name: Clean-up
      shell: bash
      if: ${{ env.LLM_AGENT_RUN == 'true' && always() }}
      run: |
        # Clean-up
        rm -rf "$HOME/.pi"
        rm -f "$annotations_file" "$summary_file" "$session_file"
        rm -rf "$patches_path"
